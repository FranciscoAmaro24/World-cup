<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC Predictor — Programme Picker</title>
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; }
  #root { height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wc-data.jsx"></script>
<script type="text/babel" src="wc-ui.jsx"></script>
<script type="text/babel" src="programme-picker.jsx"></script>

<script type="text/babel" data-presets="react">
const W = 390, H = 844;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="mobile" title="The score picker — in the Matchday Programme system"
        subtitle="The core pick screen, restyled the same way as the fixtures hybrid: cream paper, Archivo Black names, Rajdhani LED scoreboard, pitch-green + lime, square corners. The old dark number inputs become ink LED boxes with +/− steppers (tap them — fully live). Two leans so the 1↔3 spectrum still holds; boost + rival carry over from the earlier explorations.">
        <DCArtboard id="m-edit" label="Mobile · editorial lean (≈1.5)" width={W} height={H}><PickerProgEditorial /></DCArtboard>
        <DCArtboard id="m-bcast" label="Mobile · broadcast lean (≈2.5)" width={W} height={H}><PickerProgBroadcast /></DCArtboard>
      </DCSection>

      <DCSection id="desktop" title="Desktop picker — programme"
        subtitle="Same system at desktop: broadcast header band, editorial two-column body (pick + boost left, at-stake / rival / consensus right), square corners. Steppers, boost and the lock-in CTA are live.">
        <DCArtboard id="d-pick" label="Desktop · programme picker" width={1180} height={720}><PickerProgDesktop /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
