name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short
        env:
          DATABASE_URL: sqlite:///:memory:
          SECRET_KEY: ci-test-secret-not-for-production

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Run production DB migrations
        run: |
          flyctl ssh console --app world-cup -C "python3 -c \"
          import sqlite3
          conn = sqlite3.connect('/data/worldcup.db')
          cols = [r[1] for r in conn.execute('PRAGMA table_info(predictions)').fetchall()]
          if 'boosted' not in cols:
              conn.execute('ALTER TABLE predictions ADD COLUMN boosted BOOLEAN DEFAULT 0')
              conn.commit()
              print('Migration: added boosted column')
          else:
              print('Migration: already up to date')
          conn.close()
          \""
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
