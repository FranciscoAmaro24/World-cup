services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - wc_data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-long-random-secret-before-deploying}
      - DATABASE_URL=sqlite:////app/data/worldcup.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - app
    restart: unless-stopped

volumes:
  wc_data:
  nginx_certs:
