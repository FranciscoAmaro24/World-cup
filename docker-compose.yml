services:
  app:
    build: .
    volumes:
      - wc_data:/app/data
      - wc_uploads:/app/app/static/uploads
    environment:
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - DATABASE_URL=sqlite:////app/data/worldcup.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/certs
      - wc_uploads:/app/static/uploads:ro   # serve uploads directly
    depends_on:
      - app
    restart: unless-stopped

volumes:
  wc_data:
  wc_uploads:
  nginx_certs:
