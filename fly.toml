# fly.toml app configuration file generated for world-cup on 2026-06-06T10:23:14Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'world-cup'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  DATABASE_URL = "sqlite:////data/worldcup.db"
  UPLOADS_DIR = "/data/uploads"

[[mounts]]
  source = "wc_data"
  destination = "/data"
  initial_size = "3gb"
